[env:m5stick-c-plus]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200

; M5StickC Plus has ESP32-PICO-D4 with 4MB flash, same as M5Stick-C
; M5Unified auto-detects the Plus variant vs original by hardware ID
board_build.f_cpu = 240000000L

lib_deps =
    m5stack/M5Unified @ ^0.2.17
    m5stack/M5GFX @ ^0.2.5
    m5stack/M5_RoverC @ ^0.0.1
    h2zero/NimBLE-Arduino @ ^2.2.0
    bblanchon/ArduinoJson @ ^7.0.0
